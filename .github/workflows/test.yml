name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Foundry zkSync project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install foundry-zksync
        run: |
          mkdir -p ~/.foundry/bin
          curl -L https://github.com/matter-labs/foundry-zksync/releases/download/foundry-zksync-v0.1.9/foundry_zksync_v0.1.9_linux_amd64.tar.gz | tar -xz -C ~/.foundry/bin
          echo "$HOME/.foundry/bin" >> $GITHUB_PATH

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build

      - name: Run Forge tests
        run: forge test --zksync --zk-enable-eravm-extensions -vvv
